# Docker Compose para Zarvent Repuestos (defensa academica).
#
# Dos servicios:
#   - `mysql`: imagen `mysql:8.4` con volumen nombrado y healthcheck.
#   - `web`:   imagen construida desde `./Dockerfile.web`, monta
#              `./source` como volumen en `/workspace`.
#
# Para arrancar:
#   docker compose up --build -d
#
# Para detener (sin perder datos):
#   docker compose down
#
# Para reset total (borra el volumen de MySQL):
#   docker compose down -v
#   docker compose up --build -d
#
# Las variables que aparecen en este archivo se resuelven desde
# `./.env` (si existe) o desde el entorno del shell. Ver
# `.env.example` para los valores por defecto. Los valores resueltos
# tambien se inyectan como env vars en el contenedor `web` para que
# `db_config.py` los use con prioridad sobre `presentation/source/.env`.

services:
  mysql:
    image: mysql:8.4
    container_name: zarvent_mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sis122_zarvent_repuestos}
      MYSQL_USER: ${MYSQL_USER:-zarvent_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
    volumes:
      - zarvent_mysql_data:/var/lib/mysql
      # Init scripts: GRANTs del usuario app. Se ejecutan la primera
      # vez que se inicializa el volumen. Cambiar el contenido de este
      # directorio no afecta un volumen ya inicializado.
      - ./docker/01-grants.sql:/docker-entrypoint-initdb.d/01-grants.sql:ro
    ports:
      # `127.0.0.1:3307` evita colisionar con un MySQL local del host
      # que use el puerto estandar 3306. Para DataGrip usar `3307`.
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$$MYSQL_ROOT_PASSWORD" --silent
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  web:
    build:
      context: ./source
      dockerfile: ../Dockerfile.web
    container_name: zarvent_web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Conexion a MySQL dentro de la red de Docker. El host es el
      # nombre del servicio (`mysql`), NO `127.0.0.1` ni `localhost`.
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-sis122_zarvent_repuestos}
      DB_USER: ${DB_USER:-zarvent_app}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-zarvent-academic-secret-key-122}
      SQL_TRACE_ENABLED: ${SQL_TRACE_ENABLED:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WAIT_FOR_MYSQL_TIMEOUT_SECONDS: ${WAIT_FOR_MYSQL_TIMEOUT_SECONDS:-120}
      WAIT_FOR_MYSQL_INTERVAL_SECONDS: ${WAIT_FOR_MYSQL_INTERVAL_SECONDS:-2}
    volumes:
      # Monta el codigo fuente en `/workspace` para que la edicion
      # desde el host (Windows) se vea inmediatamente en el contenedor.
      # `docker compose restart web` toma cambios en `.py`. Los
      # templates HTML se recargan sin reinicio (`TEMPLATES_AUTO_RELOAD`).
      - ./source:/workspace
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-5000}:5000"

volumes:
  zarvent_mysql_data:
    name: zarvent_mysql_data
