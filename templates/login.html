<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zarvent Repuestos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="login-container">
        <h1>Zarvent Repuestos</h1>
        <h2>Iniciar sesion</h2>

        {% if message %}
            <p class="message">{{ message }}</p>
        {% endif %}

        <form method="post">
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" placeholder="Nombre de usuario" required>

            <label for="password">Contrasena</label>
            <input id="password" name="password" type="password" placeholder="Contrasena" required>

            <button type="submit">Entrar</button>
        </form>
    </main>
</body>
</html>
